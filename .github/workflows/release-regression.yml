name: Release Regression

on:
  workflow_dispatch:
    inputs:
      skip_pack:
        description: "Skip packaging smoke test"
        required: true
        default: true
        type: boolean

jobs:
  release-regression:
    name: Release Regression (windows, py3.12)
    runs-on: windows-latest

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install PyInstaller (full release regression only)
        if: ${{ !inputs.skip_pack }}
        run: python -m pip install pyinstaller

      - name: Run Release Regression (skip packaging smoke)
        if: ${{ inputs.skip_pack }}
        run: python scripts/run_release_regression.py --skip-pack

      - name: Run Release Regression (full)
        if: ${{ !inputs.skip_pack }}
        run: python scripts/run_release_regression.py
